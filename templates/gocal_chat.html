<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metron - Chat Extrator Gocal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/gocal_chat.css') }}">
</head>

<body data-theme="light">
    <!-- Campos Ocultos para Integracao -->
    <input type="hidden" id="integrationUserId" value="{{ integration.user_id if integration.user_id else '' }}">
    <input type="hidden" id="integrationToken" value="{{ integration.token if integration.token else '' }}">
    <input type="hidden" id="integrationEmpresaId"
        value="{{ integration.empresa_id if integration.empresa_id else '' }}">
    <div class="header">
        <div class="header-left">
            <div class="logo"></div>
            <div>
                <div class="header-title">Metron</div>
                <div class="header-subtitle">
                    Assistente Gocal
                </div>
                <div class="chat-status-bar">
                    <span id="currentPageDisplay" class="status-item">
                        <span class="status-value">Lendo...</span>
                    </span>
                    <span id="tokenCounter" class="status-item">
                        <i class="status-icon">🪙</i>
                        <span class="status-value">0</span>
                    </span>
                </div>
            </div>
        </div>
        <div class="header-right">
            <button class="theme-toggle" id="themeToggle" title="Alternar tema">
                🌙
            </button>
            <button class="close-down-btn" onclick="fecharWidget()" title="Fechar">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
            </button>
        </div>
    </div>

    <div class="main-layout">
        <!-- Sidebar (Oculta por padrão no mobile) -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">📁 Arquivos PDF</div>
                <div class="sidebar-subtitle">Arraste ou clique para adicionar</div>
            </div>
            <div class="sidebar-content">
                <div class="upload-section">
                    <div class="upload-box" id="uploadBox">
                        <div class="upload-icon">📄</div>
                        <div class="upload-text">Arraste seus PDFs aqui</div>
                    </div>
                </div>
                <!-- Lista removida -->
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    <div class="avatar">🤖</div>
                    <div class="message-content">
                        <strong>Olá, sou o Metron, seu assistente.</strong>
                    </div>
                </div>
            </div>

            <!-- Área de Input -->
            <div class="chat-input-area">
                <div class="input-container-integrated">
                    <textarea class="chat-input" id="chatInput" rows="1"
                        placeholder="Pergunte qualquer coisa ao Metron..."
                        autocomplete="off"></textarea>
                    <div class="input-footer-actions">
                        <input type="file" id="fileInput" multiple accept=".pdf" style="display: none;">
                        <button class="attach-btn-integrated" id="attachBtn" title="Anexar PDFs">
                            +
                        </button>
                        <button class="send-btn-integrated" id="sendBtn" title="Enviar">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                        </button>
                    </div>
                </div>

                <div class="action-bar" id="actionBar">
                    <button class="action-btn" onclick="solicitarExtracao()">
                        📊 Extrair Dados
                    </button>
                    <button class="action-btn" onclick="insertarNoBanco()">
                        💾 Inserir no Banco
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="{{ url_for('static', filename='js/validation_gocal.js') }}?v={{ range(1, 99999) | random }}"></script>
    <script src="{{ url_for('static', filename='js/gocal_chat.js') }}?v={{ range(1, 99999) | random }}"></script>
</body>

</html>
